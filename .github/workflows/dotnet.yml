name: Build and Deploy (minimal zip)

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

env:
  PLUGIN_NAME: AuraTracker
  PROJECT_FILE: AuraTracker/AuraTracker.csproj

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve build version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $v = "${{ github.ref_name }}" -replace '^v',''
          }
          else {
            $v = "0.0.0-ci.${{ github.run_number }}"
          }

          "PLUGIN_VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Download OriathHub SDK
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $feed = Join-Path $env:RUNNER_TEMP "oriathhub-feed"
          New-Item -ItemType Directory -Path $feed -Force | Out-Null

          $headers = @{
            Accept = "application/vnd.github+json"
            Authorization = "Bearer $env:GH_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $release = Invoke-RestMethod `
            -Headers $headers `
            -Uri "https://api.github.com/repos/danthespal/OriathHubSDK/releases/latest"

          $assets = @($release.assets | Where-Object { $_.name -like "OriathHub.Sdk.*.nupkg" })
          if ($assets.Count -ne 1) {
            throw "Expected exactly one OriathHub SDK package in the latest release; found $($assets.Count)"
          }

          $asset = $assets[0]
          $versionMatch = [regex]::Match($asset.name, '^OriathHub\.Sdk\.(?<version>.+)\.nupkg$')
          if (-not $versionMatch.Success) {
            throw "Could not determine the OriathHub SDK version from $($asset.name)"
          }

          $sdkVersion = $versionMatch.Groups['version'].Value
          $destination = Join-Path $feed $asset.name

          Invoke-WebRequest $asset.browser_download_url -OutFile $destination

          "ORIATHHUB_FEED=$feed" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "ORIATHHUB_SDK_VERSION=$sdkVersion" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Using OriathHub.Sdk $sdkVersion from release $($release.tag_name)"

      - name: Restore
        shell: pwsh
        run: |
          dotnet nuget add source "$env:ORIATHHUB_FEED" --name oriathhub-local
          dotnet restore "$env:PROJECT_FILE" `
            -p:OriathHubSdkVersion="$env:ORIATHHUB_SDK_VERSION"

      - name: Build (Release) to known folder
        shell: pwsh
        run: |
          $referencePath = Join-Path $pwd "libs"
          dotnet build `
            "$env:PROJECT_FILE" `
            -c Release `
            --no-restore `
            -p:Version=$env:PLUGIN_VERSION `
            -p:OriathHubSdkVersion="$env:ORIATHHUB_SDK_VERSION" `
            -p:ContinuousIntegrationBuild=true `
            -p:Deterministic=true `
            -p:ReferencePath="$referencePath" `
            -o build

      - name: Stage files under AuraTracker/
        shell: pwsh
        run: |
          $dll = Join-Path "build" ("$env:PLUGIN_NAME.dll")
          $pdb = Join-Path "build" ("$env:PLUGIN_NAME.pdb")
          if (-not (Test-Path $dll)) { throw "$dll not found" }

          $destDir = Join-Path "package" $env:PLUGIN_NAME
          New-Item -ItemType Directory -Path $destDir -Force | Out-Null

          Copy-Item -Path $dll -Destination $destDir -Force
          if (Test-Path $pdb) { Copy-Item -Path $pdb -Destination $destDir -Force }

          Write-Host "Packaged contents:"
          Get-ChildItem -Recurse package | ForEach-Object { $_.FullName }

      - name: Zip
        shell: pwsh
        run: |
          $zipName = "$env:PLUGIN_NAME-${{ github.ref_name }}.zip"
          Compress-Archive -Path "package/*" -DestinationPath $zipName -Force
          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.PLUGIN_NAME }}-${{ github.ref_name }}
          files: ${{ github.workspace }}/${{ env.ZIP_NAME }}
          generate_release_notes: true
